<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0e27" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Geometric shapes representing Web, Mobile, Desktop -->
  <!-- Desktop Window -->
  <rect x="30" y="50" width="45" height="50" fill="none" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <line x1="30" y1="58" x2="75" y2="58" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Mobile Phone -->
  <rect x="87" y="45" width="26" height="50" fill="none" stroke="#60a5fa" stroke-width="2" rx="3"/>
  <circle cx="100" cy="98" r="1.5" fill="#60a5fa"/>
  
  <!-- Web/Globe -->
  <circle cx="152" cy="75" r="23" fill="none" stroke="#93c5fd" stroke-width="2"/>
  <path d="M 129 75 Q 152 75 175 75" stroke="#93c5fd" stroke-width="1.5"/>
  <path d="M 152 52 Q 152 75 152 98" stroke="#93c5fd" stroke-width="1.5"/>
  <path d="M 129 60 Q 152 75 175 90" stroke="#93c5fd" stroke-width="1" opacity="0.6"/>
  
  <!-- Center accent dot -->
  <circle cx="100" cy="130" r="4" fill="#3b82f6"/>
  <circle cx="100" cy="130" r="8" fill="none" stroke="#3b82f6" stroke-width="1"/>
  
  <!-- Company name text area indicator -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle">APPSYRA</text>
</svg>
